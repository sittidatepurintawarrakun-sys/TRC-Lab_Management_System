<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRC Smart Mass Balance Platform</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .sidebar-item.active { background-color: #e0e7ff; color: #4338ca; border-right: 4px solid #4338ca; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-in { animation: slideIn 0.4s ease-out forwards; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c7c7c7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-functions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYalG5sMWG9jy4Lg-475TH_xuIRwA146w",
            authDomain: "lab-trc-management-system.firebaseapp.com",
            projectId: "lab-trc-management-system",
            storageBucket: "lab-trc-management-system.appspot.com",
            messagingSenderId: "43919979160",
            appId: "1:43919979160:web:779cb9de75cd4b9fce56ed"
        };
        const app = initializeApp(firebaseConfig);
        const functions = getFunctions(app, "asia-southeast1");
        
        // ส่งต่อให้ React ใช้งานผ่าน window object
        window.api = {
            getTraceabilityReport: httpsCallable(functions, 'getTraceabilityReport'),
            getCreditBalance: httpsCallable(functions, 'getCreditBalance')
        };
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

        // --- ICONS ---
        const Icon = ({ path, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
        );
        const Icons = {
            Home: (props) => <Icon path={<><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>} {...props} />,
            Search: (props) => <Icon path={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} {...props} />,
            Alert: (props) => <Icon path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} {...props} />,
            Layers: (props) => <Icon path={<><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>} {...props} />,
            Truck: (props) => <Icon path={<><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></>} {...props} />,
            Activity: (props) => <Icon path={<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>} {...props} />,
            Flask: (props) => <Icon path={<><path d="M9 3H15M10 9H14M3 21H21M5 21V10L10 3H14L19 10V21"/></>} {...props} />,
            CheckCircle: (props) => <Icon path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} {...props} />
        };

        // --- COMPONENTS ---

        // 🟢 MODULE 1: EXECUTIVE DASHBOARD
        const DashboardView = () => {
            const [data, setData] = useState({ FSC: 0, FSC_CW: 0, PEFC: 0 });
            const [suspension, setSuspension] = useState({ active: false, time: null });

            useEffect(() => {
                const loadData = async () => {
                    if(!window.api) return;
                    try {
                        const res = await window.api.getCreditBalance();
                        if(res.data.success) {
                            setData(res.data.balance || { FSC: 0, FSC_CW: 0, PEFC: 0 });
                            setSuspension({ active: res.data.pefcSuspended, time: res.data.pefcResumeTime });
                        }
                    } catch (e) { console.error("Error loading balance", e); }
                };
                // รอ Firebase Load แป๊บนึง
                setTimeout(loadData, 1000);
            }, []);

            return (
                <div className="p-8 space-y-6 animate-slide-in">
                    <div>
                        <h2 className="text-3xl font-bold text-slate-800">Executive Dashboard</h2>
                        <p className="text-slate-500">Real-time Mass Balance & Certification Status</p>
                    </div>

                    {/* 🚨 PEFC Suspension Alert */}
                    {suspension.active && (
                        <div className="bg-red-600 text-white p-4 rounded-xl shadow-lg flex items-center justify-between animate-pulse">
                            <div className="flex items-center gap-3">
                                <Icons.Alert size={28} />
                                <div>
                                    <h4 className="font-bold text-lg">⚠️ PEFC Claim Suspended (16-Hour Rule)</h4>
                                    <p className="text-sm opacity-90">System blocked from PEFC claims due to High-Risk Material. Resumes at: {suspension.time}</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* KPI Cards (Split Standards) */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {/* FSC Mix - Amber Theme */}
                        <div className="bg-amber-50 p-6 rounded-xl shadow-sm border-2 border-amber-200">
                            <p className="text-sm font-bold text-amber-700 uppercase">FSC Mix Credit (99%)</p>
                            <h3 className="text-4xl font-black text-slate-800 mt-2">{data.FSC.toLocaleString(undefined, {maximumFractionDigits:2})} <span className="text-sm font-normal text-slate-500">Tons</span></h3>
                            <p className="text-xs text-amber-600 mt-2">Expiring Policy: 24 Months (FIFO)</p>
                        </div>
                        
                        {/* FSC CW - Slate Theme */}
                        <div className="bg-slate-50 p-6 rounded-xl shadow-sm border-2 border-slate-200">
                            <p className="text-sm font-bold text-slate-600 uppercase">FSC Control Wood (99%)</p>
                            <h3 className="text-4xl font-black text-slate-800 mt-2">{data.FSC_CW.toLocaleString(undefined, {maximumFractionDigits:2})} <span className="text-sm font-normal text-slate-500">Tons</span></h3>
                            <p className="text-xs text-slate-500 mt-2">Expiring Policy: 24 Months (FIFO)</p>
                        </div>

                        {/* PEFC - Emerald Theme */}
                        <div className={`p-6 rounded-xl shadow-sm border-2 ${suspension.active ? 'bg-red-50 border-red-300 opacity-50' : 'bg-emerald-50 border-emerald-200'}`}>
                            <p className="text-sm font-bold text-emerald-700 uppercase">PEFC Certified (93%)</p>
                            <h3 className="text-4xl font-black text-slate-800 mt-2">{data.PEFC.toLocaleString(undefined, {maximumFractionDigits:2})} <span className="text-sm font-normal text-slate-500">Tons</span></h3>
                            <p className="text-xs text-emerald-600 mt-2">Expiring Policy: 12 Months (FIFO)</p>
                        </div>
                    </div>
                </div>
            );
        };

        // 🟢 MODULE 3: END-TO-END TRACEABILITY
        const TraceabilityView = () => {
            const [searchType, setSearchType] = useState('INVOICE');
            const [searchValue, setSearchValue] = useState('');
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleSearch = async (e) => {
                e.preventDefault();
                if(!searchValue || !window.api) return;
                setLoading(true); setError(''); setData(null);
                try {
                    const res = await window.api.getTraceabilityReport({ searchType, searchValue });
                    if(res.data.success) {
                        setData(res.data.data);
                    } else {
                        setError(res.data.message);
                    }
                } catch (err) {
                    setError('ไม่สามารถเชื่อมต่อฐานข้อมูลได้: ' + err.message);
                }
                setLoading(false);
            };

            return (
                <div className="p-8 animate-slide-in pb-20">
                    <div className="max-w-4xl mx-auto">
                        <div className="text-center mb-10">
                            <h2 className="text-3xl font-bold text-slate-800">End-to-End Traceability</h2>
                            <p className="text-slate-500 mt-2">Auditor's Trail: Trace from Finished Fibre back to Pulp Origin</p>
                        </div>

                        {/* Search Input */}
                        <div className="bg-white p-3 rounded-2xl shadow-lg border border-slate-200 flex items-center mb-8 gap-2">
                            <select className="bg-slate-100 border-none p-3 rounded-xl outline-none font-bold text-slate-600"
                                value={searchType} onChange={(e) => setSearchType(e.target.value)}>
                                <option value="INVOICE">Invoice No.</option>
                                <option value="DO">DO No.</option>
                            </select>
                            <form onSubmit={handleSearch} className="flex-1 flex">
                                <input type="text" placeholder="ระบุเลขที่เอกสาร..." 
                                    className="w-full px-4 py-3 outline-none text-slate-700 font-medium"
                                    value={searchValue} onChange={(e) => setSearchValue(e.target.value)} />
                                <button type="submit" disabled={loading} className="bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-400 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-md">
                                    {loading ? 'TRACING...' : 'TRACE'}
                                </button>
                            </form>
                        </div>

                        {error && <div className="p-4 bg-red-50 text-red-600 border border-red-200 rounded-xl font-bold text-center">{error}</div>}

                        {/* 🟢 Timeline Mapping (5 Steps) */}
                        {data && !loading && (
                            <div className="bg-white rounded-2xl p-8 shadow-sm border border-slate-200">
                                <h3 className="text-xl font-bold text-slate-800 mb-8 flex items-center gap-2 border-b pb-4">
                                    <Icons.Layers className="text-indigo-600"/> Data Genealogy Flow
                                </h3>

                                {/* Step 1: Marketing */}
                                {data.marketing && (
                                    <div className="relative pl-10 pb-8">
                                        <div className="absolute left-3 top-2 bottom-0 w-0.5 bg-slate-200"></div>
                                        <div className="absolute left-0 top-0 p-1.5 bg-blue-100 text-blue-600 rounded-full z-10 border-4 border-white"><Icons.CheckCircle size={16}/></div>
                                        <h4 className="font-bold text-blue-800">1. Marketing (Sales & Claim)</h4>
                                        <div className="mt-2 p-4 bg-blue-50/50 border border-blue-100 rounded-lg text-sm text-slate-600">
                                            <div className="grid grid-cols-2 gap-2">
                                                <p><strong>Invoice:</strong> {data.marketing.invoice}</p>
                                                <p><strong>Customer:</strong> {data.marketing.customer}</p>
                                                <p><strong>Claim Type:</strong> <span className="font-bold text-blue-700 bg-blue-100 px-2 py-0.5 rounded">{data.marketing.claim}</span></p>
                                                <p><strong>Volume Deducted:</strong> {data.marketing.weightTon} Tons</p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Step 2: Warehouse */}
                                {data.warehouse && (
                                    <div className="relative pl-10 pb-8">
                                        <div className="absolute left-3 top-2 bottom-0 w-0.5 bg-slate-200"></div>
                                        <div className="absolute left-0 top-0 p-1.5 bg-indigo-100 text-indigo-600 rounded-full z-10 border-4 border-white"><Icons.Truck size={16}/></div>
                                        <h4 className="font-bold text-indigo-800">2. Warehouse (Dispatch & DO)</h4>
                                        <div className="mt-2 p-4 bg-indigo-50/50 border border-indigo-100 rounded-lg text-sm text-slate-600">
                                            <p><strong>DO No:</strong> {data.warehouse.deliveryNo}</p>
                                            <p><strong>Production Dates Filtered:</strong> {data.warehouse.productionDates?.join(', ')}</p>
                                        </div>
                                    </div>
                                )}

                                {/* Step 3: Spinning */}
                                <div className="relative pl-10 pb-8">
                                    <div className="absolute left-3 top-2 bottom-0 w-0.5 bg-slate-200"></div>
                                    <div className="absolute left-0 top-0 p-1.5 bg-teal-100 text-teal-600 rounded-full z-10 border-4 border-white"><Icons.Activity size={16}/></div>
                                    <h4 className="font-bold text-teal-800">3. Spinning (Actual Output)</h4>
                                    <div className="mt-2 p-4 bg-teal-50/50 border border-teal-100 rounded-lg text-sm text-slate-600">
                                        {data.spinning?.length > 0 ? data.spinning.map((s, i) => (
                                            <div key={i} className="mb-2 border-b border-teal-100 pb-2">
                                                <p className="font-bold text-teal-700">Prod Date: {s.date}</p>
                                                <ul className="list-disc pl-5 mt-1">
                                                    {s.data.map((tx, j) => <li key={j}>Machine: {tx.line} | Claim: {tx.claimType} | Output: {tx.weight} T</li>)}
                                                </ul>
                                            </div>
                                        )) : <p className="text-slate-400">No matching production data found.</p>}
                                    </div>
                                </div>

                                {/* Step 4: Viscose */}
                                <div className="relative pl-10 pb-8">
                                    <div className="absolute left-3 top-2 bottom-0 w-0.5 bg-slate-200"></div>
                                    <div className="absolute left-0 top-0 p-1.5 bg-orange-100 text-orange-600 rounded-full z-10 border-4 border-white"><Icons.Flask size={16}/></div>
                                    <h4 className="font-bold text-orange-800">4. Viscose (Pulp Consumption)</h4>
                                    <div className="mt-2 p-4 bg-orange-50/50 border border-orange-100 rounded-lg text-sm text-slate-600">
                                        {data.viscose?.length > 0 ? data.viscose.map((v, i) => (
                                            <div key={i} className="mb-2 border-b border-orange-100 pb-2">
                                                <p className="font-bold text-orange-700">Date: {v.date}</p>
                                                <ul className="list-disc pl-5 mt-1">
                                                    {v.data.map((tx, j) => <li key={j}>Brand: {tx.brand} | <strong>Lot: {tx.docRef}</strong> | Consumed: {tx.weight} T</li>)}
                                                </ul>
                                            </div>
                                        )) : <p className="text-slate-400">No matching pulp consumption found.</p>}
                                    </div>
                                </div>

                                {/* Step 5: RM QA */}
                                <div className="relative pl-10">
                                    <div className="absolute left-0 top-0 p-1.5 bg-emerald-100 text-emerald-600 rounded-full z-10 border-4 border-white"><Icons.CheckCircle size={16}/></div>
                                    <h4 className="font-bold text-emerald-800">5. RM QA (Pulp Certification)</h4>
                                    <div className="mt-2 p-4 bg-emerald-50/50 border border-emerald-100 rounded-lg text-sm text-slate-600">
                                        {data.rmQa?.length > 0 ? data.rmQa.map((qa, i) => (
                                            <div key={i} className="mb-2 bg-white p-3 border border-emerald-100 rounded shadow-sm">
                                                <p><strong>Supplier:</strong> {qa.supplier}</p>
                                                <p><strong>Matched Lot No:</strong> {qa.lotNo || qa.batchNo}</p>
                                                <p><strong>Alpha Cellulose:</strong> {qa.parameters?.alphaCellulose?.lab || '-'}%</p>
                                            </div>
                                        )) : <p className="text-slate-400">No matching COA records found for the used Lots.</p>}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 🟢 MAIN APP LAYOUT
        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');

            return (
                <div className="flex min-h-screen bg-slate-50">
                    {/* Sidebar */}
                    <div className="w-64 bg-slate-900 text-slate-300 fixed h-full shadow-lg z-20 hidden md:flex flex-col">
                        <div className="p-6 border-b border-slate-800">
                            <h1 className="font-bold text-white text-xl flex items-center gap-2">
                                <Icons.Layers className="text-indigo-400"/> TRC Smart Chain
                            </h1>
                            <p className="text-[10px] text-slate-500 font-semibold uppercase tracking-wider mt-1">Mass Balance OS</p>
                        </div>
                        <nav className="mt-4 space-y-1 flex-1 px-3">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}><Icons.Home size={18}/> Executive Overview</button>
                            <button onClick={() => setActiveTab('traceability')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all ${activeTab === 'traceability' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}><Icons.Search size={18}/> Traceability Tracker</button>
                        </nav>
                        <div className="p-4 border-t border-slate-800">
                            <div className="flex items-center gap-2 text-xs text-emerald-400 font-bold">
                                <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div> DB Connected
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="flex-1 md:ml-64 relative min-h-screen">
                        {activeTab === 'dashboard' ? <DashboardView /> : <TraceabilityView />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

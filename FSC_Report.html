        <script

        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
            import {
                getFunctions,
                httpsCallable,
            } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-functions.js";
            import {
                getFirestore,
                collection,
                doc,
                getDoc,
                getDocs,
                query,
                orderBy,
                limit,
                deleteDoc,
            } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

            const firebaseConfig = {
                apiKey: "AIzaSyCYalG5sMWG9jy4Lg-475TH_xuIRwA146w",
                authDomain: "lab-trc-management-system.firebaseapp.com",
                projectId: "lab-trc-management-system",
                storageBucket: "lab-trc-management-system.appspot.com",
                messagingSenderId: "43919979160",
                appId: "1:43919979160:web:779cb9de75cd4b9fce56ed",
            };
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const functions = getFunctions(app, "asia-southeast1");

            // ส่งต่อ Module ให้ React เรียกใช้แบบ Native
            window.api = {
                getCreditBalance: httpsCallable(functions, "getCreditBalance"),
                getEnterpriseMassBalance: httpsCallable(
                    functions,
                    "getEnterpriseMassBalance",
                ),
                getEnterpriseTraceability: httpsCallable(
                    functions,
                    "getEnterpriseTraceability",
                ),
                getTraceabilityReport: httpsCallable(
                    functions,
                    "getTraceabilityReport",
                ),
            };

            // 🟢 เพิ่มการ Expose Firestore Method ให้ React เอาไปใช้เปิด Modal ได้
            window.db = db;
            window.doc = doc;
            window.getDoc = getDoc;
        </script>
    </head>
    <body>
        <div id="root"></div>

        <script type="text/babel">
            const { useState, useEffect } = React;
            const {
                BarChart,
                Bar,
                LineChart,
                Line,
                XAxis,
                YAxis,
                CartesianGrid,
                Tooltip,
                Legend,
                ResponsiveContainer,
                ComposedChart,
            } = Recharts;

            // --- ICONS ---
            const Icon = ({ path, size = 20, className = "" }) => (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                >
                    {path}
                </svg>
            );
            const Icons = {
                Home: (props) => (
                    <Icon
                        path={
                            <>
                                <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                                <polyline points="9 22 9 12 15 12 15 22" />
                            </>
                        }
                        {...props}
                    />
                ),
                Search: (props) => (
                    <Icon
                        path={
                            <>
                                <circle cx="11" cy="11" r="8" />
                                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                            </>
                        }
                        {...props}
                    />
                ),
                Alert: (props) => (
                    <Icon
                        path={
                            <>
                                <circle cx="12" cy="12" r="10" />
                                <line x1="12" y1="8" x2="12" y2="12" />
                                <line x1="12" y1="16" x2="12.01" y2="16" />
                            </>
                        }
                        {...props}
                    />
                ),
                Layers: (props) => (
                    <Icon
                        path={
                            <>
                                <polygon points="12 2 2 7 12 12 22 7 12 2" />
                                <polyline points="2 17 12 22 22 17" />
                                <polyline points="2 12 12 17 22 12" />
                            </>
                        }
                        {...props}
                    />
                ),
                Truck: (props) => (
                    <Icon
                        path={
                            <>
                                <rect x="1" y="3" width="15" height="13" />
                                <polygon points="16 8 20 8 23 11 23 16 16 16 16 8" />
                                <circle cx="5.5" cy="18.5" r="2.5" />
                                <circle cx="18.5" cy="18.5" r="2.5" />
                            </>
                        }
                        {...props}
                    />
                ),
                Activity: (props) => (
                    <Icon
                        path={
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                        }
                        {...props}
                    />
                ),
                Flask: (props) => (
                    <Icon
                        path={
                            <>
                                <path d="M9 3H15M10 9H14M3 21H21M5 21V10L10 3H14L19 10V21" />
                            </>
                        }
                        {...props}
                    />
                ),
                CheckCircle: (props) => (
                    <Icon
                        path={
                            <>
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                                <polyline points="22 4 12 14.01 9 11.01" />
                            </>
                        }
                        {...props}
                    />
                ),
                Clock: (props) => (
                    <Icon
                        path={
                            <>
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="12 6 12 12 16 14" />
                            </>
                        }
                        {...props}
                    />
                ),
                TrendingUp: (props) => (
                    <Icon
                        path={
                            <>
                                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                                <polyline points="17 6 23 6 23 12" />
                            </>
                        }
                        {...props}
                    />
                ),
                ShieldAlert: (props) => (
                    <Icon
                        path={
                            <>
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                                <path d="M12 8v4" />
                                <path d="M12 16h.01" />
                            </>
                        }
                        {...props}
                    />
                ),
            };

            // =========================================================================
            // 🟢 MODULE 1 & 2: OPERATIONAL DASHBOARD & PERIOD ANALYSIS
            // =========================================================================
            const CustomTooltip = ({ active, payload, label }) => {
                if (active && payload && payload.length) {
                    // คำนวณหาค่า Actual Fibre และ Theoretical จาก payload แบบอัตโนมัติ
                    const actualFibre =
                        payload.find((p) => p.dataKey.includes("Actual"))
                            ?.value || 0;
                    const targetCredit =
                        payload.find((p) => p.dataKey.includes("Theoretical"))
                            ?.value || 0;
                    const variance = actualFibre - targetCredit;
                    const isOverClaim = variance > 0;

                    return (
                        <div className="bg-white p-4 border border-slate-200 shadow-xl rounded-xl text-sm min-w-[220px]">
                            <p className="font-bold text-slate-800 border-b border-slate-100 pb-2 mb-3">
                                {label}
                            </p>
                            {payload.map((entry, index) => (
                                <div
                                    key={index}
                                    className="flex justify-between gap-6 py-1"
                                >
                                    <span className="text-slate-600">
                                        {entry.name}:
                                    </span>
                                    <span
                                        className="font-bold"
                                        style={{ color: entry.color }}
                                    >
                                        {entry.value.toLocaleString(undefined, {
                                            minimumFractionDigits: 2,
                                            maximumFractionDigits: 2,
                                        })}{" "}
                                        T
                                    </span>
                                </div>
                            ))}
                            {/* แสดง Insight ทันทีว่าสถานะตอนนี้บวกหรือลบ */}
                            <div
                                className={`mt-3 pt-3 border-t flex justify-between font-bold ${isOverClaim ? "text-red-600" : "text-emerald-600"}`}
                            >
                                <span>Variance (Actual - Target):</span>
                                <span>
                                    {variance > 0 ? "+" : ""}
                                    {variance.toLocaleString(undefined, {
                                        minimumFractionDigits: 2,
                                        maximumFractionDigits: 2,
                                    })}{" "}
                                    T
                                </span>
                            </div>
                        </div>
                    );
                }
                return null;
            };

            // 🟢 เพิ่ม Tooltip พิเศษสำหรับกราฟ Storytelling โดยเฉพาะ
                        const StoryTooltip = ({ active, payload, label }) => {
                            if (active && payload && payload.length) {
                                return (
                                    <div className="bg-white p-3 border border-slate-200 shadow-xl rounded-xl text-sm min-w-[180px]">
                                        <p className="font-bold text-slate-800 border-b border-slate-100 pb-2 mb-2">{label}</p>
                                        {payload.map((entry, index) => (
                                            <div key={index} className="flex justify-between gap-4 py-1">
                                                <span className="text-slate-600">{entry.name}:</span>
                                                <span className="font-bold" style={{ color: entry.color }}>
                                                    {entry.value.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })} T
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                );
                            }
                            return null;
                        };

                        // 🟢 เพิ่ม Component กราฟย่อยสำหรับ Storytelling แยกตาม Line
            // 🟢 เพิ่ม Component กราฟย่อยสำหรับ Storytelling แยกตาม Line (อัปเดตใหม่ 4 แท่ง FSC/PEFC)
                            const LineMassBalanceChart = ({ title, data, fscIn, fscOut, pefcIn, pefcOut }) => {
                            return (
                                <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col">
                                    <h4 className="font-bold text-slate-700 mb-4 text-center">{title}</h4>
                                    <div className="h-72 w-full mt-2">
                            <ResponsiveContainer width="100%" height="100%">
                                <ComposedChart data={data} margin={{ top: 10, right: 10, left: -10, bottom: 0 }}>
                                    <CartesianGrid stroke="#e2e8f0" strokeDasharray="3 3" vertical={false} />
                                    <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fill: "#64748b", fontSize: 10 }} dy={10} />
                                    <YAxis axisLine={false} tickLine={false} tick={{ fill: "#64748b", fontSize: 10 }} dx={-10} />
                                    <Tooltip content={<StoryTooltip />} cursor={{ fill: "#f8fafc" }} />
                                    <Legend wrapperStyle={{ paddingTop: "10px", fontSize: "11px" }} iconType="circle" />
                                    <Bar dataKey={fscIn} name="Pulp FSC In" fill="#cbd5e1" radius={[4, 4, 0, 0]} barSize={12} />
                                    <Bar dataKey={fscOut} name="Fibre FSC Out" fill="#f59e0b" radius={[4, 4, 0, 0]} barSize={12} />
                                    <Bar dataKey={pefcIn} name="Pulp PEFC In" fill="#94a3b8" radius={[4, 4, 0, 0]} barSize={12} />
                                    <Bar dataKey={pefcOut} name="Fibre PEFC Out" fill="#10b981" radius={[4, 4, 0, 0]} barSize={12} />
                                </ComposedChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                );
            };

                        const DashboardView = () => {
                            const [balanceData, setBalanceData] = useState({
                                FSC: 0,
                                FSC_CW: 0,
                                PEFC: 0,
                            });
                            const [suspension, setSuspension] = useState({
                                active: false,
                                time: null,
                            });
                            const [massBalanceData, setMassBalanceData] = useState([]);
                            const [loading, setLoading] = useState(true);
                            const [lastUpdate, setLastUpdate] = useState(null);

                            // 🟢 1. เพิ่ม State สำหรับเก็บค่าชั่วคราวก่อนกด Confirm
                            const [tempStartDate, setTempStartDate] = useState("");
                            const [tempEndDate, setTempEndDate] = useState("");

                            // 🟢 2. สร้างฟังก์ชันเพื่อเรียก API ใหม่และส่งวันที่ไป Backend
                            const loadEnterpriseData = async (
                                filterStart = null,
                                filterEnd = null,
                            ) => {
                                if (!window.api) return;
                                setLoading(true);
                                try {
                                    const res = await window.api.getCreditBalance();
                                    if (res.data.success) {
                                        setBalanceData(res.data.balance || { FSC: 0, FSC_CW: 0, PEFC: 0 });
                                        setSuspension({ active: res.data.pefcSuspended, time: res.data.pefcResumeTime });

                                        // 🟢 นำเวลาจาก Backend มาแปลง Format แบบสวยๆ (DD/MM/YYYY HH:MM)
                                        if (res.data.lastUpdated) {
                                            const dateObj = new Date(res.data.lastUpdated);
                                            setLastUpdate(dateObj.toLocaleString('en-GB', { 
                                                day: '2-digit', month: '2-digit', year: 'numeric', 
                                                hour: '2-digit', minute: '2-digit', second: '2-digit' 
                                            }));
                                        }
                                    }

                                    // 🌟 ส่งค่า startDate, endDate ไปให้ Backend ประมวลผล
                                    const mbRes = await window.api.getEnterpriseMassBalance(
                                        {
                                            startDate: filterStart,
                                            endDate: filterEnd,
                                        },
                                    );

                                    if (mbRes.data.success) {
                                            const chartData = mbRes.data.data.map((d) => ({
                                            name: d.period,
                                            Pulp_FSC_Input: (d.inputs_Pulp?.FSC_Mix || 0) + (d.inputs_Pulp?.FSC_CW || 0),

                                            // 🟢 1. เพิ่ม 2 บรรทัดนี้เข้าไปใน map เพื่อเก็บข้อมูลแยกกัน
                                            Pulp_FSC_Mix_Input: d.inputs_Pulp?.FSC_Mix || 0,
                                            Pulp_FSC_CW_Input: d.inputs_Pulp?.FSC_CW || 0,

                                            Pulp_PEFC_Input: d.inputs_Pulp?.PEFC || 0,
                                            Fibre_FSC_Actual: d.outputs_Fibre?.FSC || 0,
                                            Fibre_PEFC_Actual: d.outputs_Fibre?.PEFC || 0,
                                            Theoretical_FSC_Mix: d.theoreticalCredits?.FSC_Mix_Credit ?? d.theoreticalCredits?.FSC ?? 0,
                                            Theoretical_FSC_CW: d.theoreticalCredits?.FSC_CW || 0,
                                            Theoretical_PEFC:
                                                d.theoreticalCredits?.PEFC || 0,
                                            Warning: d.varianceWarning || false,
                                            storeData: d.storeData || {},
                                            mc2_fsc: d.machineData?.MC2?.FSC || 0,
                                            mc3_fsc: d.machineData?.MC3?.FSC || 0,
                                            mc5_fsc: d.machineData?.MC5?.FSC || 0,
                                            mc6_fsc: d.machineData?.MC6?.FSC || 0,
                                            mc2_pefc: d.machineData?.MC2?.PEFC || 0,
                                            mc3_pefc: d.machineData?.MC3?.PEFC || 0,
                                            mc5_pefc: d.machineData?.MC5?.PEFC || 0,
                                            mc6_pefc: d.machineData?.MC6?.PEFC || 0,

                                            // 🟢 แมปข้อมูลสำหรับ Dashboard Storytelling (ถ้า backend ส่งมาให้ใน lineData หรือปรับแก้ตามโครงสร้างจริงได้เลย)
                                            // 🟢 แมปข้อมูลสำหรับ Dashboard Storytelling แยกระดับ Line และมาตรฐาน (FSC/PEFC)
                                            modalPulpIn_FSC: d.inputs_Pulp_ByLine?.Modal?.FSC || 0,
                                            modalPulpIn_PEFC: d.inputs_Pulp_ByLine?.Modal?.PEFC || 0,
                                            greyPulpIn_FSC: d.inputs_Pulp_ByLine?.Grey?.FSC || 0,
                                            greyPulpIn_PEFC: d.inputs_Pulp_ByLine?.Grey?.PEFC || 0,
                                            nwPulpIn_FSC: d.inputs_Pulp_ByLine?.NonWoven?.FSC || 0,
                                            nwPulpIn_PEFC: d.inputs_Pulp_ByLine?.NonWoven?.PEFC || 0,

                                            modalFibreOut_FSC: d.machineData?.MC2?.FSC || 0,
                                            modalFibreOut_PEFC: d.machineData?.MC2?.PEFC || 0,
                                            greyFibreOut_FSC: d.machineData?.MC5?.FSC || 0,
                                            greyFibreOut_PEFC: d.machineData?.MC5?.PEFC || 0,
                                            nwFibreOut_FSC: (d.machineData?.MC3?.FSC || 0) + (d.machineData?.MC6?.FSC || 0),
                                            nwFibreOut_PEFC: (d.machineData?.MC3?.PEFC || 0) + (d.machineData?.MC6?.PEFC || 0),
                                            marketingData: d.marketingData || d.marketing || { FSC: 0, PEFC: 0, NonClaim: 0 },
                                            totalFSCSold: d.totalFSCSold || d.marketing?.totalFSCSold || d.marketingData?.totalFSCSold || d.marketingData?.FSC || 0,
                                            totalPEFCSold: d.totalPEFCSold || d.marketing?.totalPEFCSold || d.marketingData?.totalPEFCSold || d.marketingData?.PEFC || 0,
                                            totalNormalSold: d.totalNormalSold || d.marketing?.totalNormalSold || d.marketingData?.totalNormalSold || d.marketingData?.NonClaim || d.marketingData?.Normal || 0,
                                        }));
                                        setMassBalanceData(chartData.reverse());
                                    }
                                } catch (e) {
                                    console.error("Error loading enterprise data", e);
                                } finally {
                                    setLoading(false);
                                }
                            };

                            // 🟢 3. เรียกฟังก์ชันนี้ตอนโหลดหน้าเว็บครั้งแรก
                            useEffect(() => {
                                setTimeout(() => loadEnterpriseData(), 1000);
                            }, []);

                            // 🟢 4. ผูกปุ่ม Confirm และ Clear
                            const handleConfirmFilter = () => {
                                loadEnterpriseData(tempStartDate, tempEndDate);
                            };

                            const handleClearFilter = () => {
                                setTempStartDate("");
                                setTempEndDate("");
                                loadEnterpriseData(null, null); // กลับไปโหมดรายเดือน
                            };

                            // 🟢 5. เนื่องจาก Backend กรองและจัดกลุ่มช่วงเวลามาให้แล้ว filteredData จึงเท่ากับ massBalanceData ได้เลย
                            const filteredData = massBalanceData;

                            // 🟢 6. อัปเดตฟังก์ชัน Export ให้ครอบคลุม Storytelling data
                            const handleExportExcel = () => {
                                if (filteredData.length === 0) {
                                    alert("ไม่มีข้อมูลสำหรับ Export ในช่วงเวลาที่เลือก");
                                    return;
                                }

                                // =========================================================================
                                // SHEET 1: Traceability Audit Data (แบบกว้าง - รูปแบบเดิมสำหรับคนอ่าน)
                                // =========================================================================
                                const storeBrandsOrder = [
                                    "ARAUCO FSC Mix Credit",
                                    "ARAUCO FSC Control Wood",
                                    "ARAUCO PEFC",
                                    "AVC FSC Mix Credit",
                                    "AVC FSC Control Wood",
                                    "AVC PEFC",
                                    "AVN FSC Mix Credit",
                                    "AVN FSC Control Wood",
                                    "PHOENIX FSC Control Wood",
                                    "TEL Pellita FSC Control Wood"
                                ];

                                const originalData = filteredData.map((d) => {
                                    let row = { "Period (เดือน/ปี/วัน)": d.name };

                                    if (d.storeData) {
                                        storeBrandsOrder.forEach((brandKey) => {
                                            row[`${brandKey} Receive (T)`] = d.storeData[brandKey]?.IN || 0;
                                            row[`${brandKey} Issued to Viscose (T)`] = d.storeData[brandKey]?.OUT || 0;
                                        });
                                        Object.keys(d.storeData).forEach((brandKey) => {
                                            if (!storeBrandsOrder.includes(brandKey)) {
                                                row[`${brandKey} Receive (T)`] = d.storeData[brandKey]?.IN || 0;
                                                row[`${brandKey} Issued to Viscose (T)`] = d.storeData[brandKey]?.OUT || 0;
                                            }
                                        });
                                    }

                                    row["FSC Pulp Consumed (Tons)"] = d.Pulp_FSC_Mix_Input || d.Pulp_FSC_Input;
                                    row["Max Allowed FSC Mix Credit (Tons)"] = d.Theoretical_FSC_Mix;
                                    row["Max Allowed FSC CW Credit (Tons)"] = d.Theoretical_FSC_CW;
                                    row["PEFC Pulp Consumed (Tons)"] = d.Pulp_PEFC_Input;
                                    row["Max Allowed PEFC Credit (Tons)"] = d.Theoretical_PEFC;

                                    row["Modal Pulp Input (FSC)"] = d.modalPulpIn_FSC;
                                    row["Modal Pulp Input (PEFC)"] = d.modalPulpIn_PEFC;
                                    row["Grey Pulp Input (FSC)"] = d.greyPulpIn_FSC;
                                    row["Grey Pulp Input (PEFC)"] = d.greyPulpIn_PEFC;
                                    row["NonWoven Pulp Input (FSC)"] = d.nwPulpIn_FSC;
                                    row["NonWoven Pulp Input (PEFC)"] = d.nwPulpIn_PEFC;

                                    row["MC2 Actual FSC Output"] = d.mc2_fsc;
                                    row["MC3 Actual FSC Output"] = d.mc3_fsc;
                                    row["MC5 Actual FSC Output"] = d.mc5_fsc;
                                    row["MC6 Actual FSC Output"] = d.mc6_fsc;
                                    row["MC2 Actual PEFC Output"] = d.mc2_pefc;
                                    row["MC3 Actual PEFC Output"] = d.mc3_pefc;
                                    row["MC5 Actual PEFC Output"] = d.mc5_pefc;
                                    row["MC6 Actual PEFC Output"] = d.mc6_pefc;

                                    row["Total Actual FSC Fibre (Tons)"] = d.Fibre_FSC_Actual;
                                    row["Total Actual PEFC Fibre (Tons)"] = d.Fibre_PEFC_Actual;

                                    // 🟢 เพิ่มข้อมูลฝั่ง Marketing (Sales) ลงในตารางกว้าง
                                    // ⚠️ จุดที่ต้องตรวจสอบ: เปลี่ยนชื่อตัวแปร d.marketingData ให้ตรงกับ JSON ของคุณ
                                    const salesFSC = d.totalFSCSold || 0;
                                    const salesPEFC = d.totalPEFCSold || 0;
                                    const salesNonClaim = d.totalNormalSold || 0;

                            // --- State สำหรับ Fibre Quality Modal ---
                            const [fibreModal, setFibreModal] = useState({
                                isOpen: false, date: "", machine: "", productType: "", data: null, rawData: null, loading: false, activeTab: "stats", deliveredBatches: [],
                            });
                            const [coaModal, setCoaModal] = useState({
                                isOpen: false, lotNo: "", brand: "", coaData: null, targetDate: ""
                            });
                            const openCoaStats = (lotNo, brand, allCoaData, targetDate) => {
                                if (!allCoaData || allCoaData.length === 0) {
                                    setCoaModal({ isOpen: true, lotNo: lotNo, brand: brand, coaData: null });
                                    return;
                                }

                                const cleanTargetLot = String(lotNo).trim().toUpperCase();

                                // 1. กรองหา Lot ที่ตรงกันทั้งหมดมาก่อน
                                const matchedLots = allCoaData.filter(qa => {
                                    const qaLot = qa.lotNo ? String(qa.lotNo).trim().toUpperCase() : "";
                                    const qaBatch = qa.batchNo ? String(qa.batchNo).trim().toUpperCase() : "";
                                    return qaLot === cleanTargetLot || qaBatch === cleanTargetLot;
                                });

                                if (matchedLots.length === 0) {
                                    setCoaModal({ isOpen: true, lotNo: lotNo, brand: brand, coaData: null });
                                    return;
                                }

                                // 2. พยายามหาวันที่ให้ตรงกับ Dissolving Date (เป๊ะๆ)
                                let finalCoa = matchedLots.find(qa => {
                                    if (!qa.receivedDate) return false;
                                    // แปลง ISO Date ให้เหลือแค่ YYYY-MM-DD แล้วมาเทียบกัน
                                    const recDate = new Date(qa.receivedDate).toISOString().split('T')[0];
                                    return recDate === targetDate;
                                });

                                // 3. ถ้าหาวันที่ตรงเป๊ะไม่เจอ (อาจจะลืมบันทึกของวันนั้น) ให้เอาตัวล่าสุดมาแสดงแทน (ดีกว่าไม่ขึ้นอะไรเลย)
                            if (!finalCoa) {
                                    finalCoa = matchedLots[0];
                                }
                                setCoaModal({ isOpen: true, lotNo: lotNo, brand: brand, coaData: finalCoa, targetDate: targetDate });
                            };

                            const closeCoaStats = () => setCoaModal({ isOpen: false, lotNo: "", brand: "", coaData: null });

                            const openFibreStats = async (date, machineFull, matCode, deliveredBatches = []) => {
                                let machineId = machineFull.replace("Line ", "").trim();
                                if (machineId.includes("Machine-0")) machineId = machineId.replace("Machine-0", "MC");
                                else if (machineId.includes("Machine-")) machineId = machineId.replace("Machine-", "MC");

                                let productType = "Grey";
                                if (machineId === "MC2") productType = "Modal";
                                else if (matCode && matCode.toUpperCase().endsWith("N")) productType = "NonWoven";

                                setFibreModal({ isOpen: true, date, machine: machineId, productType, data: null, rawData: null, loading: true, activeTab: "stats", deliveredBatches });

                                try {
                                    const db = window.db; const doc = window.doc; const getDoc = window.getDoc;
                                    const statsRef = doc(db, `stats_Product_${productType}`, `${machineId}_${date}`);
                                    const rawRef = doc(db, "product_raw_logs", `${machineId}_${date}`);
                                    const [statsSnap, rawSnap] = await Promise.all([getDoc(statsRef), getDoc(rawRef)]);

                                    setFibreModal((prev) => ({
                                        ...prev, loading: false,
                                        data: statsSnap.exists() ? statsSnap.data() : null,
                                        rawData: rawSnap.exists() ? rawSnap.data().data : null,
                                    }));
                                } catch (err) {
                                    console.error("Error fetching fibre stats:", err);
                                    setFibreModal((prev) => ({ ...prev, loading: false, data: "ERROR" }));
                                }
                            };

                            const closeFibreStats = () => setFibreModal({ isOpen: false, date: "", machine: "", productType: "", data: null, rawData: null, loading: false, activeTab: "stats", deliveredBatches: [] });

                            const openProcessStats = async (date, machineFull) => {
                                let machineId = machineFull.replace("Line ", "").trim();
                                if (machineId.includes("Machine-0")) machineId = machineId.replace("Machine-0", "MC");
                                else if (machineId.includes("Machine-")) machineId = machineId.replace("Machine-", "MC");

                                setProcessModal({ isOpen: true, date, machine: machineId, data: null, rawData: null, loading: true, activeTab: "stats" });

                                try {
                                    const db = window.db; const doc = window.doc; const getDoc = window.getDoc;
                                    const visRef = doc(db, "stats_Viscose", `${machineId}_${date}`);
                                    const auxRef = doc(db, "stats_Auxiliary", `${machineId}_${date}`);
                                    const spinRef = doc(db, "stats_Spinning", `${machineId}_${date}`);
                                    const rawRef = doc(db, "process_raw_logs", `${machineId}_${date}`);
                                    const [visSnap, auxSnap, spinSnap, rawSnap] = await Promise.all([getDoc(visRef), getDoc(auxRef), getDoc(spinRef), getDoc(rawRef)]);

                                    setProcessModal((prev) => ({
                                        ...prev, loading: false,
                                        data: {
                                            Viscose: visSnap.exists() ? visSnap.data().stats : null,
                                            Auxiliary: auxSnap.exists() ? auxSnap.data().stats : null,
                                            Spinning: spinSnap.exists() ? spinSnap.data().stats : null,
                                        },
                                        rawData: rawSnap.exists() ? rawSnap.data().data : null,
                                    }));
                                } catch (err) {
                                    console.error("Error fetching process stats:", err);
                                    setProcessModal((prev) => ({ ...prev, loading: false, data: "ERROR" }));
                                }
                            };

                            const closeProcessStats = () => setProcessModal({ isOpen: false, date: "", machine: "", data: null, rawData: null, loading: false, activeTab: "stats" });

                            const handleSearch = async (e) => {
                                e.preventDefault();
                                if (!searchValue || !window.api) return;
                                setLoading(true); setError(""); setData(null);

                                try {
                                    const res = await window.api.getTraceabilityReport({ searchValue: searchValue, searchType: searchType });
                                    if (res.data.success) {
                                        const raw = res.data.data;
                                        setData({
                                            salesInfo: {
                                                invoice: raw.marketing?.invoice || "-",
                                                customer: raw.marketing?.customer || "-",
                                                claimType: raw.marketing?.claim || "-",
                                                volume: raw.marketing?.weightTon || 0,
                                                machine: raw.marketing?.machine || "-",
                                                matCode: raw.marketing?.matCode || "-",
                                            },
                                            dispatchInfo: raw.warehouse ? { doNo: raw.warehouse.deliveryNo, deliveredBatches: raw.warehouse.deliveredBatches || [] } : null,
                                            productionInfo: raw.spinning || [],
                                            fibreLab: raw.fibreLab || [],
                                            fibreLabRaw: raw.fibreLabRaw || [], // 🟢 เพิ่มบรรทัดนี้
                                            processStats: raw.processStats || [], // 🟢 เพิ่มบรรทัดนี้
                                            processRaw: raw.processRaw || [],     // 🟢 เพิ่มบรรทัดนี้
                                            pulpConsumption: raw.viscose || [],
                                            coaData: raw.rmQa || [],
                                        });
                                    } else {
                                        setError(" ❌  " + res.data.message);
                                    }
                                } catch (err) {
                                    setError(" ❌  การเชื่อมต่อ Database ขัดข้อง: " + err.message);
                                }
                                setLoading(false);
                            };
                            const handleExportTraceabilityExcel = () => {
                                if (!data) {
                                    alert("ไม่มีข้อมูลสำหรับ Export กรุณากด Trace Ledger เพื่อค้นหาข้อมูลก่อนครับ");
                                    return;
                                }

                                const targetMachine = data.salesInfo?.machine || "-";

                                // ==========================================
                                // Sheet 1: Marketing & Sales 
                                // ==========================================
                                const salesSheetData = [{
                                    "Search Type": searchType,
                                    "Search Reference": searchValue,
                                    "Invoice No": data.salesInfo?.invoice || "-",
                                    "Customer": data.salesInfo?.customer || "-",
                                    "Claim Type": data.salesInfo?.claimType || "-",
                                    "Volume Deducted (Tons)": data.salesInfo?.volume || 0,
                                    "Machine": targetMachine,
                                    "Material Code": data.salesInfo?.matCode || "-",
                                    "Delivery No (DO)": data.dispatchInfo?.doNo || "-",
                                    "Delivered Batches": data.dispatchInfo?.deliveredBatches?.join(", ") || "-"
                                }];

                                // ==========================================
                                // Sheet 2A: Fibre Lab Summary
                                // ==========================================
                                let fibreLabSumData = [];
                                if (data.fibreLab && data.fibreLab.length > 0) {
                                     data.fibreLab.forEach(lab => {
                                         if (lab.stats) {
                                             const validParams = Object.entries(lab.stats).filter(([p]) => p !== 'Batch' && p !== 'Material Code');
                                             validParams.forEach(([param, val]) => {
                                                 fibreLabSumData.push({
                                                     "Lab Date": lab.date || "-",
                                                     "Machine": targetMachine,
                                                     "Parameter": param,
                                                     "Average": val.avg !== undefined ? val.avg.toFixed(2) : "-",
                                                     "Min": val.min !== undefined && val.min !== Infinity ? val.min.toFixed(2) : "-",
                                                     "Max": val.max !== undefined && val.max !== -Infinity ? val.max.toFixed(2) : "-",
                                                     "%CV": val.cv !== undefined ? val.cv.toFixed(2) + "%" : "-"
                                                 });
                                             });
                                         }
                                     });
                                }
                                if (fibreLabSumData.length === 0) fibreLabSumData.push({ "Note": "No Finished Fibre Lab Summary Found" });

                                // ==========================================
                                // Sheet 2B: Fibre Lab Logs (Raw Hourly/Batch)
                                // ==========================================
                                let fibreLabLogsData = [];
                                if (data.fibreLabRaw && data.fibreLabRaw.length > 0) {
                                    data.fibreLabRaw.forEach(logObj => {
                                        const rawDict = logObj.data[logObj.type]; // เช่น logObj.data["Modal"]
                                        if (rawDict) {
                                            const params = Object.keys(rawDict).filter(p => p !== 'Batch' && p !== 'Material Code');
                                            const batches = rawDict['Batch'] || [];
                                            const maxRows = Math.max(...Object.values(rawDict).map(arr => arr.length));

                                            // Transpose: แปลงจาก Object of Arrays เป็น Array of Objects
                                            for (let i = 0; i < maxRows; i++) {
                                                let row = {
                                                    "Lab Date": logObj.date,
                                                    "Batch No.": batches[i] || `#${i+1}`
                                                };
                                                params.forEach(p => {
                                                    row[p] = rawDict[p][i] ?? "-";
                                                });
                                                fibreLabLogsData.push(row);
                                            }
                                        }
                                    });
                                }
                                if (fibreLabLogsData.length === 0) fibreLabLogsData.push({ "Note": "No Lab Raw Logs Found" });

                                // ==========================================
                                // Sheet 3A: Process Summary (Viscose, Aux, Spin)
                                // ==========================================
                                let processSumData = [];
                                if (data.processStats && data.processStats.length > 0) {
                                    data.processStats.forEach(statObj => {
                                        ['viscose', 'auxiliary', 'spinning'].forEach(dept => {
                                            const deptData = statObj[dept];
                                            if (deptData) {
                                                Object.entries(deptData).forEach(([param, val]) => {
                                                    processSumData.push({
                                                        "Production Date": statObj.date,
                                                        "Department": dept.toUpperCase(),
                                                        "Parameter": param,
                                                        "Average": val.avg !== undefined ? val.avg.toFixed(2) : "-",
                                                        "Min": val.min !== undefined && val.min !== Infinity ? val.min.toFixed(2) : "-",
                                                        "Max": val.max !== undefined && val.max !== -Infinity ? val.max.toFixed(2) : "-",
                                                        "%CV": val.cv !== undefined ? val.cv.toFixed(2) + "%" : "-"
                                                    });
                                                });
                                            }
                                        });
                                    });
                                }
                                if (processSumData.length === 0) processSumData.push({ "Note": "No In-Process Summary Data Found" });

                                // ==========================================
                                // Sheet 3B: Process Hourly Logs
                                // ==========================================
                                let processLogsData = [];
                                if (data.processRaw && data.processRaw.length > 0) {
                                    data.processRaw.forEach(rawObj => {
                                        ['viscose', 'auxiliary', 'spinning'].forEach(dept => {
                                            const deptRaw = rawObj.data[dept];
                                            if (deptRaw) {
                                                const params = Object.keys(deptRaw);
                                                const maxRows = Math.max(...Object.values(deptRaw).map(arr => arr.length));

                                                for (let i = 0; i < maxRows; i++) {
                                                    const startHour = (i + 7) % 24; // คำนวณเวลาเริ่มกะ
                                                    const endHour = (startHour + 1) % 24;
                                                    const timeStr = `${String(startHour).padStart(2, '0')}:00-${String(endHour).padStart(2, '0')}:00`;

                                                    let row = {
                                                        "Production Date": rawObj.date,
                                                        "Department": dept.toUpperCase(),
                                                        "Time Slot": timeStr
                                                    };
                                                    params.forEach(p => {
                                                        row[p] = deptRaw[p][i] ?? "-";
                                                    });
                                                    processLogsData.push(row);
                                                }
                                            }
                                        });
                                    });
                                }
                                if (processLogsData.length === 0) processLogsData.push({ "Note": "No Process Hourly Logs Found" });

                                // ==========================================
                                // Sheet 4: Viscose Consumption & Sheet 5: COA (จากโค้ดเดิม)
                                // ==========================================
                                let viscoseSheetData = [];
                                const usedLots = new Set(); 
                                if (data.pulpConsumption && data.pulpConsumption.length > 0) {
                                    data.pulpConsumption.forEach(visc => {
                                        if (visc.data && visc.data.length > 0) {
                                            visc.data.forEach(tx => {
                                                viscoseSheetData.push({
                                                    "Dissolving Date": visc.date || "-",
                                                    "Brand": tx.brand || "-",
                                                    "Lot / DocRef": tx.docRef || "-",
                                                    "Standard / Claim": tx.claimType || tx.standard || "NORMAL",
                                                    "Consumed Weight (Tons)": tx.weight || 0
                                                });
                                                if (tx.docRef) usedLots.add(String(tx.docRef).trim().toUpperCase());
                                            });
                                        }
                                    });
                                }
                                if (viscoseSheetData.length === 0) viscoseSheetData.push({ "Note": "No Pulp Consumption Data Found" });

                                // ==========================================
                                // Sheet 5: Pulp Inspection Report (COA)
                                // ==========================================
                                let coaSheetData = [];

                                // 🟢 เพิ่ม targetDate เข้าไปเป็นเงื่อนไข
                                const findMatchedCoa = (targetLot, targetDate, allCoaData) => {
                                    if (!allCoaData || allCoaData.length === 0) return null;
                                    const cleanTargetLot = String(targetLot).trim().toUpperCase();

                                    const matchedLots = allCoaData.filter(qa => {
                                        const qaLot = qa.lotNo ? String(qa.lotNo).trim().toUpperCase() : "";
                                        const qaBatch = qa.batchNo ? String(qa.batchNo).trim().toUpperCase() : "";
                                        return qaLot === cleanTargetLot || qaBatch === cleanTargetLot;
                                    });

                                    if (matchedLots.length === 0) return null;

                                    const exactMatch = matchedLots.find(qa => {
                                        if (!qa.receivedDate) return false;
                                        const recDate = new Date(qa.receivedDate).toISOString().split('T')[0];
                                        return recDate === targetDate;
                                    });

                                    return exactMatch || matchedLots[0]; // หาตรงวันไม่เจอ ให้เอาตัวแรก
                                };

                                // วนลูปตามข้อมูลที่เบิกใช้จริงใน Viscose
                                viscoseSheetData.forEach(vData => {
                                    const lot = vData["Lot / DocRef"];
                                    const dDate = vData["Dissolving Date"]; // ดึงวันที่ใช้งานมา

                                    if (lot && lot !== "-") {
                                        const matchedCoa = findMatchedCoa(lot, dDate, data.coaData);
                                        if (matchedCoa && matchedCoa.parameters) {

                                            Object.entries(matchedCoa.parameters).forEach(([paramName, vals]) => {
                                                const labels = { alphaCellulose: 'Alpha Cellulose (%)', viscosity: 'Viscosity (ISO)', whiteness: 'Whiteness', moisture: 'Moisture (%)', r18: 'Alkali Res. (R18) (%)' };
                                                const displayParamName = labels[paramName] || paramName;

                                                // เช็คก่อนว่ามีข้อมูลถูก push เข้าไปหรือยัง เพื่อไม่ให้ซ้ำซ้อนใน Excel
                                                const isDuplicate = coaSheetData.some(row => 
                                                    row["Lot No"] === lot && 
                                                    row["Target Dissolving Date"] === dDate && 
                                                    row["Parameter"] === displayParamName
                                                );

                                                if (!isDuplicate) {
                                                    coaSheetData.push({
                                                        "Target Dissolving Date": dDate, // 🟢 ใส่ให้รู้ว่าอ้างอิงจากวันใช้งานไหน
                                                        "Lot No": lot,
                                                        "Brand": vData["Brand"],
                                                        "Supplier": matchedCoa.supplier || "-",
                                                        "QC Received Date": matchedCoa.receivedDate ? new Date(matchedCoa.receivedDate).toLocaleDateString('en-GB') : "-",
                                                        "Parameter": displayParamName,
                                                        "COA Value": vals.coa || "-",
                                                        "Lab Value": vals.lab || "-"
                                                    });
                                                }
                                            });
                                        }
                                    }
                                });

                                if (coaSheetData.length === 0) coaSheetData.push({ "Note": "No matching COA Data Found for used lots" });
                                // ==========================================
                                // ประกอบร่าง Excel Workbook
                                // ==========================================
                                const wb = XLSX.utils.book_new();

                                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(salesSheetData), "1_Marketing_Sales");
                                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(fibreLabSumData), "2A_FibreLab_Summary");
                                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(fibreLabLogsData), "2B_FibreLab_Logs");
                                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(processSumData), "3A_Process_Summary");
                                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(processLogsData), "3B_Process_Logs");
                                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(viscoseSheetData), "4_Viscose_Consumption");
                                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(coaSheetData), "5_Pulp_COA");

                                const fileName = `Genealogy_Flow_${searchType}_${searchValue}.xlsx`;
                                XLSX.writeFile(wb, fileName);
                            };

                            return (
                                <div className="p-8 animate-slide-in pb-20">
                                    <div className="max-w-4xl mx-auto">
                                        <div className="text-center mb-10">
                                            <h2 className="text-3xl font-bold text-slate-800">Smart CoC Traceability Tracker</h2>
                                            <p className="text-slate-500 mt-2">End-to-End Auditor's Trail (Marketing ➔ Warehouse ➔ Spinning ➔ Viscose ➔ RM QA)</p>
                                        </div>

                                        <div className="bg-white p-3 rounded-2xl shadow-lg border border-slate-200 flex items-center mb-8 gap-2">
                                            <div className="bg-slate-100 border-none p-3 rounded-xl font-bold text-slate-600 flex items-center gap-2">
                                                <Icons.Search size={18} />
                                                <select value={searchType} onChange={(e) => setSearchType(e.target.value)} className="bg-transparent outline-none cursor-pointer">
                                                    <option value="INVOICE">INVOICE NO.</option>
                                                    <option value="DO">DELIVERY NO. (DO)</option>
                                                </select>
                                            </div>
                                            <form onSubmit={handleSearch} className="flex-1 flex">
                                                <input type="text" placeholder={`ระบุเลขที่ ${searchType === "INVOICE" ? "Invoice" : "Delivery No."} ที่ต้องการตรวจสอบ...`} className="w-full px-4 py-3 outline-none text-slate-700 font-medium" value={searchValue} onChange={(e) => setSearchValue(e.target.value)} />
                                                <button type="submit" disabled={loading} className="bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-400 text-white px-8 py-3 rounded-xl font-bold transition-all shadow-md">
                                                    {loading ? "TRACING..." : "TRACE LEDGER"}
                                                </button>
                                            </form>
                                        </div>

                                        {error && <div className="p-4 bg-red-50 text-red-600 border border-red-200 rounded-xl font-bold text-center mb-8">{error}</div>}

                                        {data && !loading && (
                                        <div className="bg-white rounded-2xl p-8 shadow-sm border border-slate-200">

                                            {/* 🟢 เริ่มส่วน Header ที่แก้ไขเพื่อใส่ปุ่ม */}
                                            <div className="flex flex-col md:flex-row justify-between md:items-center border-b pb-4 mb-8 gap-4">
                                                <div>
                                                    <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                                        <Icons.Layers className="text-indigo-600" /> Data Genealogy Flow
                                                    </h3>
                                                    <span className="text-xs text-slate-400 flex items-center gap-1 mt-1">
                                                        <Icons.CheckCircle size={14} className="text-emerald-500" /> Verified by Enterprise Automation
                                                    </span>
                                                </div>

                                                <button
                                                    onClick={handleExportTraceabilityExcel}
                                                    className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold rounded-lg transition flex items-center justify-center gap-2 shadow-md w-full md:w-auto"
                                                >
                                                    <Icons.Layers size={16} /> Export Excel
                                                </button>
                                            </div>
                                            {/* 🟢 จบส่วน Header ที่แก้ไข */}
                                                {/* Step 1: Marketing */}
                                                <div className="relative pl-10 pb-8">
                                                    <div className="absolute left-3 top-2 bottom-0 w-0.5 bg-slate-200"></div>
                                                    <div className="absolute left-0 top-0 p-1.5 bg-blue-100 text-blue-600 rounded-full z-10 border-4 border-white"><Icons.CheckCircle size={16} /></div>
                                                    <h4 className="font-bold text-blue-800">1. Marketing & Sales Deduction (ปลายน้ำ)</h4>
                                                    <div className="mt-2 p-4 bg-blue-50/50 border border-blue-100 rounded-lg text-sm text-slate-600">
                                                        <div className="grid grid-cols-2 gap-2">
                                                            <p><strong>Invoice No:</strong> {data.salesInfo.invoice}</p>
                                                            <p><strong>Customer:</strong> {data.salesInfo.customer}</p>
                                                            <p><strong>Claim Type:</strong> <span className="font-bold text-blue-700 bg-blue-100 px-2 py-0.5 rounded">{data.salesInfo.claimType}</span></p>
                                                            <p><strong>Volume Deducted:</strong> {data.salesInfo.volume} Tons</p>
                                                            <p><strong>Machine:</strong> <span className="font-bold text-slate-700 bg-slate-200 px-2 py-0.5 rounded">{data.salesInfo.machine}</span></p>
                                                            <p><strong>Material Code:</strong> <span className="font-mono text-slate-600">{data.salesInfo.matCode}</span></p>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* Step 2: Fibre Quality (Lab Data) */}
                                                <div className="relative pl-10 pb-8">
                                                    <div className="absolute left-3 top-2 bottom-0 w-0.5 bg-slate-200"></div>
                                                    <div className={`absolute left-0 top-0 p-1.5 rounded-full z-10 border-4 border-white ${data.productionInfo?.length > 0 ? "bg-indigo-100 text-indigo-600" : "bg-slate-100 text-slate-400"}`}>
                                                        <Icons.CheckCircle size={16} />
                                                    </div>
                                                    <h4 className={`font-bold ${data.productionInfo?.length > 0 ? "text-indigo-800" : "text-slate-400"}`}>2. Finished Fibre Quality (Lab Report)</h4>
                                                    {data.productionInfo?.length > 0 ? (
                                                        <div className="mt-2 p-4 bg-indigo-50/50 border border-indigo-100 rounded-lg text-sm text-slate-600 shadow-sm">
                                                            {data.productionInfo.map((s, i) => (

                                                                for (let i = 0; i < maxRowsRaw; i++) {
                                                                    const bNum = allBatches[i] ? allBatches[i].toString() : null;
                                                                    if (!isFiltering || (bNum && fibreModal.deliveredBatches.includes(bNum))) validIndices.push(i);
                                                                }
                                                                if (validIndices.length === 0) return <div className="text-center text-amber-600 py-10 font-bold bg-amber-50 rounded-xl border border-amber-200">No test logs found matching the specific shipped batches.</div>;
                                                                return (
                                                                    <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                                                        <div className="bg-indigo-900 text-white px-4 py-2 text-sm font-bold uppercase flex justify-between">
                                                                            <span>Raw Test Results</span>
                                                                            {isFiltering && <span className="bg-emerald-500 px-2 py-0.5 rounded text-xs">Filtered: {validIndices.length} Batches</span>}
                                                                        </div>
                                                                        <div className="overflow-x-auto max-h-[60vh]">
                                                                            <table className="w-full text-left border-collapse text-xs whitespace-nowrap">
                                                                                <thead>
                                                                                    <tr className="bg-slate-50 border-b border-slate-200 text-slate-700">
                                                                                        <th className="p-2 font-bold border-r bg-slate-100 sticky left-0 z-10 shadow-[1px_0_0_#e2e8f0]">Batch No.</th>
                                                                                        {params.map(p => <th key={p} className="p-2 font-semibold border-r border-slate-200">{p}</th>)}
                                                                                    </tr>
                                                                                </thead>
                                                                                <tbody className="divide-y divide-slate-100">
                                                                                    {validIndices.map((rowIndex) => (
                                                                                        <tr key={rowIndex} className="hover:bg-indigo-50 transition">
                                                                                            <td className="p-2 text-center text-indigo-700 font-bold border-r bg-slate-50 sticky left-0 z-10 shadow-[1px_0_0_#e2e8f0]">{allBatches[rowIndex] || `#${rowIndex + 1}`}</td>
                                                                                            {params.map(p => <td key={`${p}-${rowIndex}`} className="p-2 border-r border-slate-100 text-slate-600">{deptRaw[p][rowIndex] ?? '-'}</td>)}
                                                                                        </tr>
                                                                                    ))}
                                                                                </tbody>
                                                                            </table>
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })()}
                                                        </div>
                                                    )}
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* --- 🟢 COA Modal (ย้ายมาไว้ข้างใน TraceabilityView แล้ว) --- */}
                            {coaModal.isOpen && (
                                <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 animate-slide-in overflow-y-auto">
                                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-3xl flex flex-col">
                                        <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-emerald-50 rounded-t-2xl">
                                            <div>
                                                <h3 className="text-xl font-bold text-emerald-900 flex items-center gap-2">
                                                    <Icons.CheckCircle className="text-emerald-600" /> Pulp Inspection Report (COA)
                                                </h3>
                                                <p className="text-sm text-emerald-700 mt-1">
                                                    Brand: <span className="font-bold">{coaModal.brand}</span> | 
                                                    Lot No: <span className="font-bold">{coaModal.lotNo}</span>
                                                </p>
                                            </div>
                                            <button onClick={closeCoaStats} className="text-slate-400 hover:text-red-500 transition bg-white p-2 rounded-full shadow-sm">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                                            </button>
                                        </div>

                                        <div className="p-6 bg-slate-50 flex-1 overflow-y-auto max-h-[70vh]">
                                            {!coaModal.coaData ? (
                                                <div className="text-center py-10 bg-white rounded-xl border border-slate-200">
                                                    <Icons.ShieldAlert size={40} className="mx-auto text-amber-400 mb-3" />
                                                    <h4 className="font-bold text-slate-700">ไม่พบผลตรวจวิเคราะห์ (COA)</h4>
                                                    <p className="text-sm text-slate-500 mt-1">
                                                        ไม่มีข้อมูลผลตรวจ Lab สำหรับเยื่อ Lot: {coaModal.lotNo} <br/>
                                                        อาจอยู่ระหว่างรอตรวจ หรือบันทึกเลข Lot ไม่ตรงกัน
                                                    </p>
                                                </div>
                                            ) : (
                                                <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                                    <div className="bg-emerald-800 text-white px-4 py-2 text-sm font-bold uppercase tracking-wider flex justify-between">
                                                        <span>Supplier: {coaModal.coaData.supplier}</span>
                                                        <span>
                                                            DISSOLVING: {coaModal.targetDate ? new Date(coaModal.targetDate).toLocaleDateString('en-GB') : '-'}
                                                        </span>
                                                    </div>
                                                    <table className="w-full text-left border-collapse text-sm">
                                                        <thead className="bg-slate-50 border-b border-slate-200 text-slate-600">
                                                            <tr>
                                                                <th className="p-3 font-semibold w-1/2">Parameter</th>
                                                                <th className="p-3 font-semibold text-right w-1/4">COA Value</th>
                                                                <th className="p-3 font-semibold text-right w-1/4">Lab Result</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100">
                                                            {Object.entries(coaModal.coaData.parameters || {}).map(([key, val]) => {
                                                                const labels = { alphaCellulose: 'Alpha Cellulose (%)', viscosity: 'Viscosity (ISO)', whiteness: 'Whiteness', moisture: 'Moisture (%)', r18: 'Alkali Res. (R18) (%)' };
                                                                const paramName = labels[key] || key;
                                                                const coa = parseFloat(val.coa);
                                                                const lab = parseFloat(val.lab);
                                                                let diffClass = "text-slate-700";
                                                                if (!isNaN(coa) && !isNaN(lab) && coa !== 0) {
                                                                    const diffPct = Math.abs((lab - coa) / coa * 100);
                                                                    if (diffPct > 5) diffClass = "text-red-600 font-bold bg-red-50 px-2 py-0.5 rounded";
                                                                    else if (diffPct > 2) diffClass = "text-amber-600 font-bold";
                                                                }

                                                                return (
                                                                    <tr key={key} className="hover:bg-slate-50 transition">
                                                                        <td className="p-3 font-medium text-slate-700">{paramName}</td>
                                                                        <td className="p-3 text-right text-slate-500">{val.coa || '-'}</td>
                                                                        <td className={`p-3 text-right ${diffClass}`}>{val.lab || '-'}</td>
                                                                    </tr>
                                                                );
                                                            })}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                );
            };
                        // =========================================================================
                        // 🟢 MAIN APP LAYOUT (Sidebar & Navigation)
                        // =========================================================================
                        const App = () => {
                            const [activeTab, setActiveTab] = useState("dashboard");

                            return (
                                <div className="flex min-h-screen bg-slate-50">
                                    {/* Sidebar */}
                                    <div className="w-64 bg-slate-900 text-slate-300 fixed h-full shadow-lg z-20 hidden md:flex flex-col">
                                        <div className="p-6 border-b border-slate-800">
                                            <h1 className="font-bold text-white text-xl flex items-center gap-2">
                                                <Icons.Layers className="text-indigo-400" /> TRC Smart CoC
                                            </h1>
                                            <p className="text-[10px] text-slate-500 font-semibold uppercase tracking-wider mt-1">Enterprise Mass Balance OS</p>
                                        </div>
                                        <nav className="mt-4 space-y-1 flex-1 px-3">
                                            <button onClick={() => setActiveTab("dashboard")} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all ${activeTab === "dashboard" ? "bg-indigo-600 text-white shadow-md" : "hover:bg-slate-800 hover:text-white"}`}>
                                                <Icons.Home size={18} /> Operational Dashboard
                                            </button>
                                            <button onClick={() => setActiveTab("traceability")} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all ${activeTab === "traceability" ? "bg-indigo-600 text-white shadow-md" : "hover:bg-slate-800 hover:text-white"}`}>
                                                <Icons.Search size={18} /> Traceability Tracker
                                            </button>
                                        </nav>
                                        <div className="p-4 border-t border-slate-800 bg-slate-950">
                                            <div className="flex flex-col gap-1 text-xs text-slate-400">
                                                <div className="flex items-center gap-2 text-emerald-400 font-bold"><div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div> Enterprise DB Online</div>
                                                <span>Develop by Sittidate Purintawarrakun</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Main Content */}
                                    <main className="flex-1 md:ml-64 relative min-h-screen">
                                        {activeTab === "dashboard" ? <DashboardView /> : <TraceabilityView />}
                                    </main>
                                </div>
                            );
                        };

                        const root = ReactDOM.createRoot(document.getElementById("root"));
                        root.render(<App />);
                    </script>
                </body>
            </html>
